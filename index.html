<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beriyev's Website Insights Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d0c;
    --panel: #111413;
    --line: #232725;
    --text: #d9dbd4;
    --dim: #6f7570;
    --accent: #4fe0a0;
    --accent-dim: #1f4a38;
    --err: #e0654f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 40px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin: 0 0 8px;
  }
  h1 {
    font-size: 28px;
    font-weight: 500;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .sub { color: var(--dim); font-size: 14px; margin: 0; }

  .console {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .prompt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .prompt-row span {
    color: var(--accent);
    font-size: 15px;
    flex-shrink: 0;
  }
  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    padding: 6px 0;
  }
  input[type="text"]::placeholder { color: var(--dim); }

  .modes {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .mode-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    padding: 7px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .mode-btn:hover { border-color: var(--dim); color: var(--text); }
  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .run-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--accent);
    color: #06110c;
    border: none;
    padding: 9px 20px;
    border-radius: 3px;
    cursor: pointer;
    margin-left: auto;
    font-weight: 500;
  }
  .run-btn:hover { opacity: 0.88; }
  .run-btn:disabled { opacity: 0.4; cursor: default; }
  .modes-row { display: flex; align-items: center; }

  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    min-height: 20px;
    margin: 4px 2px 0;
  }
  .status.err { color: var(--err); }

  .result { display: none; }
  .result.visible { display: block; }

  .meta-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    margin: 0 0 4px;
  }
  .meta-line b { color: var(--text); font-weight: 500; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 22px;
    margin-top: 10px;
  }
  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 500;
    margin: 0 0 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .card p {
    font-size: 15px;
    line-height: 1.6;
    margin: 0;
    color: var(--text);
  }
  .card + .card { margin-top: 14px; }

  ul.points {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  ul.points li {
    padding: 10px 0;
    border-top: 1px solid var(--line);
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    gap: 10px;
  }
  ul.points li:first-child { border-top: none; padding-top: 0; }
  ul.points li::before {
    content: "›";
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }

  .raw-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--dim);
    white-space: pre-wrap;
    max-height: 340px;
    overflow-y: auto;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Beriyev's Website Insights Generator</h1>
  </header>

  <div class="console">
    <div class="prompt-row">
      <span>$</span>
      <input type="text" id="url-input" placeholder="https://example.com/article" autocomplete="off">
    </div>
    <div class="modes">
      <button class="mode-btn active" data-mode="scrape">scrape</button>
      <button class="mode-btn" data-mode="analyze">analyze</button>
      <div class="modes-row" style="margin-left:auto;">
        <button class="run-btn" id="run-btn">run →</button>
      </div>
    </div>
  </div>

  <p class="status" id="status"></p>

  <div class="result" id="result"></div>

</div>

<script>
  const API_BASE = "http://127.0.0.1:8000";

  let mode = "scrape";
  const modeButtons = document.querySelectorAll(".mode-btn");
  const runBtn = document.getElementById("run-btn");
  const urlInput = document.getElementById("url-input");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");

  modeButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      modeButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      mode = btn.dataset.mode;
    });
  });

  urlInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") runBtn.click();
  });

  runBtn.addEventListener("click", async () => {
    const url = urlInput.value.trim();
    if (!url) {
      setStatus("enter a url first", true);
      return;
    }

    resultEl.classList.remove("visible");
    resultEl.innerHTML = "";
    setStatus(mode === "scrape" ? "fetching + extracting..." : "fetching + extracting + analyzing...");
    runBtn.disabled = true;

    const endpoint = mode === "scrape" ? "/scrape" : "/analyze";

    try {
      const res = await fetch(API_BASE + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody.detail || `request failed (${res.status})`);
      }

      const data = await res.json();
      setStatus(`done — ${endpoint}`);
      render(mode, data);
    } catch (err) {
      setStatus(err.message || "something went wrong", true);
    } finally {
      runBtn.disabled = false;
    }
  });

  function setStatus(text, isErr = false) {
    statusEl.textContent = text;
    statusEl.classList.toggle("err", isErr);
  }

  function render(mode, data) {
    let html = "";

    html += `<p class="meta-line"><b>${escapeHtml(data.title || "untitled")}</b> — ${escapeHtml(data.url || "")}</p>`;
    if (data.author) html += `<p class="meta-line">by ${escapeHtml(data.author)}</p>`;
    if (data.date) html += `<p class="meta-line">${escapeHtml(data.date)}</p>`;

    if (mode === "analyze") {
      html += `<div class="card"><h2>Summary</h2><p>${escapeHtml(data.summary || "")}</p></div>`;
      if (Array.isArray(data.key_points) && data.key_points.length) {
        html += `<div class="card"><h2>Key points</h2><ul class="points">`;
        data.key_points.forEach(p => {
          html += `<li>${escapeHtml(p)}</li>`;
        });
        html += `</ul></div>`;
      }
    } else {
      html += `<div class="card"><h2>Extracted content</h2><p class="raw-text">${escapeHtml(data.text || "")}</p></div>`;
    }

    resultEl.innerHTML = html;
    resultEl.classList.add("visible");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
